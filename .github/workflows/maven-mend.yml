name: Mend CLI scan for Maven

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 22 * * 0"

permissions:
  contents: read
  security-events: write

jobs:
  call-maven-mend-ci:
    uses: patrikk0123/shared-github-actions/.github/workflows/maven-mend-ci.yml@0ba9273779e4598eb19b94d0e345d27617fb8b40 # main
    with:
      SCA: true
      SAST: true
    secrets:
      MEND_URL: ${{ secrets.MEND_URL }}
      MEND_USER_KEY: ${{ secrets.MEND_USER_KEY }}
      MEND_EMAIL: ${{ secrets.MEND_EMAIL }}
      MEND_ORGNAME: ${{ secrets.MEND_ORGNAME }}
      MEND_PRODUCTNAME: ${{ secrets.MEND_PRODUCTNAME }}

  test:
    runs-on: ubuntu-latest

    env:
      MEND_ORGNAME: ${{ secrets.MEND_ORGNAME }}

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Debug MEND_ORGNAME
        shell: bash
        env:
          MEND_ORGNAME: ${{ env.MEND_ORGNAME }}
        run: |
          echo $MEND_ORGNAME
